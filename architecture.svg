<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="font-family:Tahoma,Segoe UI,sans-serif">
  <rect width="800" height="480" fill="#111827" rx="8"/>
  <style>
    .box { fill:#1f2937; stroke:#374151; stroke-width:1.5; rx:6; }
    .app { fill:#1e3a5f; stroke:#3b82f6; stroke-width:1.5; rx:6; }
    .data { fill:#14532d; stroke:#22c55e; stroke-width:1.5; rx:6; }
    .kill { fill:#450a0a; stroke:#ef4444; stroke-width:1.5; rx:6; }
    .t1 { fill:#f3f4f6; font-size:15; font-weight:700; }
    .t2 { fill:#f3f4f6; font-size:14; font-weight:600; }
    .t3 { fill:#d1d5db; font-size:12; }
    .arr { stroke:#6b7280; stroke-width:1.5; marker-end:url(#a); }
    .arr-d { stroke:#22c55e; stroke-width:1.5; marker-end:url(#ad); }
    .arr-k { stroke:#ef4444; stroke-width:1.5; marker-end:url(#ak); }
  </style>
  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0 7 2.5 0 5" fill="#6b7280"/>
    </marker>
    <marker id="ad" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0 7 2.5 0 5" fill="#22c55e"/>
    </marker>
    <marker id="ak" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0 7 2.5 0 5" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Header -->
  <text x="400" y="32" class="t1" text-anchor="middle">Port Checker</text>
  <text x="400" y="52" class="t3" text-anchor="middle">How it works</text>

  <!-- ==================== ARROWS (behind boxes) ==================== -->
  <line x1="230" y1="105" x2="312" y2="105" class="arr"/>
  <line x1="510" y1="105" x2="592" y2="105" class="arr-k"/>
  <line x1="230" y1="257" x2="312" y2="257" class="arr-d"/>
  <line x1="510" y1="257" x2="592" y2="257" class="arr"/>
  <line x1="411" y1="140" x2="411" y2="218" class="arr-d"/>
  <line x1="411" y1="280" x2="411" y2="358" class="arr-d"/>
  <line x1="673" y1="136" x2="673" y2="224" class="arr-k" stroke-dasharray="5,4"/>

  <!-- ==================== ROW 1 ==================== -->
  <rect x="52" y="76" width="178" height="58" class="box"/>
  <text x="141" y="103" class="t2" text-anchor="middle">คุณ</text>
  <text x="141" y="123" class="t3" text-anchor="middle">รัน port-check.exe</text>

  <rect x="322" y="76" width="178" height="58" class="app"/>
  <text x="411" y="103" class="t2" text-anchor="middle">Port Checker</text>
  <text x="411" y="123" class="t3" text-anchor="middle">แสดงทุกอย่างบนหน้าจอ</text>

  <rect x="593" y="76" width="160" height="58" class="kill"/>
  <text x="673" y="103" class="t2" text-anchor="middle">Kill</text>
  <text x="673" y="123" class="t3" text-anchor="middle">คลิกเพื่อปิดโปรเซส</text>

  <!-- ==================== ROW 2 ==================== -->
  <rect x="52" y="228" width="178" height="58" class="data"/>
  <text x="141" y="255" class="t2" text-anchor="middle">netstat -ano</text>
  <text x="141" y="275" class="t3" text-anchor="middle">สแกนพอร์ต</text>

  <rect x="322" y="228" width="178" height="58" class="app"/>
  <text x="411" y="255" class="t2" text-anchor="middle">Process API</text>
  <text x="411" y="275" class="t3" text-anchor="middle">ชื่อ แรม ซีพียู</text>

  <rect x="593" y="228" width="160" height="58" class="box"/>
  <text x="673" y="255" class="t2" text-anchor="middle">System</text>
  <text x="673" y="275" class="t3" text-anchor="middle">โปรเซสที่รันอยู่</text>

  <!-- ==================== ROW 3 ==================== -->
  <rect x="140" y="368" width="520" height="82" class="app"/>
  <text x="400" y="396" class="t2" text-anchor="middle">ตารางแสดงพอร์ตทั้งหมด</text>
  <text x="400" y="417" class="t3" text-anchor="middle">Port │ PID │ Name │ Mem │ CPU │ Path</text>
  <text x="400" y="438" class="t3" text-anchor="middle">เรียง กรอง ส่งออก — แบบเรียลไทม์</text>

  <!-- Flow labels -->
  <text x="276" y="97" class="t3" text-anchor="middle">เปิด</text>
  <text x="549" y="97" class="t3" text-anchor="middle">ปิด</text>
  <text x="276" y="249" class="t3" text-anchor="middle">PID</text>
  <text x="549" y="249" class="t3" text-anchor="middle">สอบถาม</text>
</svg>
