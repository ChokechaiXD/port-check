<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" style="background:#0f172a;border-radius:12px;font-family:system-ui,-apple-system,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0 8 3 0 7" fill="#64748b"/>
    </marker>
    <marker id="arr-cyan" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0 8 3 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0 8 3 0 7" fill="#34d399"/>
    </marker>
    <marker id="arr-rose" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0 8 3 0 7" fill="#fb7185"/>
    </marker>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 0 0 0 30" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="400" y="28" fill="white" font-size="14" font-weight="700" text-anchor="middle">Port Checker — Architecture</text>

  <!-- Legend -->
  <g transform="translate(600,44)">
    <rect x="0" y="0" width="14" height="9" rx="2" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
    <text x="20" y="8" fill="#94a3b8" font-size="8">App</text>
    <rect x="56" y="0" width="14" height="9" rx="2" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
    <text x="76" y="8" fill="#94a3b8" font-size="8">Data</text>
    <rect x="0" y="14" width="14" height="9" rx="2" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1"/>
    <text x="20" y="22" fill="#94a3b8" font-size="8">Action</text>
    <rect x="56" y="14" width="14" height="9" rx="2" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1"/>
    <text x="76" y="22" fill="#94a3b8" font-size="8">External</text>
  </g>

  <!-- ==================== ROW 1 ==================== -->

  <!-- User box -->
  <rect x="30" y="65" width="130" height="60" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="95" y="91" fill="white" font-size="11" font-weight="600" text-anchor="middle">User</text>
  <text x="95" y="110" fill="#94a3b8" font-size="9" text-anchor="middle">Double-click .exe</text>

  <!-- Kill box -->
  <rect x="540" y="65" width="120" height="60" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="600" y="91" fill="white" font-size="11" font-weight="600" text-anchor="middle">Kill Process</text>
  <text x="600" y="110" fill="#fb7185" font-size="9" text-anchor="middle">Process.Kill()</text>

  <!-- App (centerpiece, taller) -->
  <rect x="240" y="55" width="180" height="85" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="330" y="82" fill="white" font-size="12" font-weight="600" text-anchor="middle">port-check.exe</text>
  <text x="330" y="100" fill="#94a3b8" font-size="9" text-anchor="middle">WinForms GUI</text>
  <text x="330" y="116" fill="#22d3ee" font-size="8" text-anchor="middle">VirtualMode DataGridView</text>

  <!-- Arrow: User → App -->
  <line x1="160" y1="95" x2="236" y2="95" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="198" y="88" fill="#64748b" font-size="9" text-anchor="middle">launches</text>

  <!-- Arrow: App → Kill -->
  <line x1="420" y1="95" x2="536" y2="95" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arr-rose)"/>
  <text x="478" y="88" fill="#fb7185" font-size="9" text-anchor="middle">user kills</text>

  <!-- ==================== ROW 2 ==================== -->

  <!-- netstat box -->
  <rect x="70" y="205" width="130" height="55" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="135" y="228" fill="white" font-size="11" font-weight="600" text-anchor="middle">netstat -ano</text>
  <text x="135" y="246" fill="#94a3b8" font-size="9" text-anchor="middle">TCP + UDP data</text>

  <!-- Process API box -->
  <rect x="270" y="200" width="170" height="65" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="355" y="223" fill="white" font-size="11" font-weight="600" text-anchor="middle">Process API</text>
  <text x="355" y="241" fill="#94a3b8" font-size="9" text-anchor="middle">GetProcessById()</text>
  <text x="355" y="255" fill="#94a3b8" font-size="9" text-anchor="middle">TotalProcessorTime</text>

  <!-- System box -->
  <rect x="550" y="205" width="120" height="55" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="610" y="228" fill="white" font-size="11" font-weight="600" text-anchor="middle">System</text>
  <text x="610" y="246" fill="#94a3b8" font-size="9" text-anchor="middle">svchost, node, etc.</text>

  <!-- Arrow: netstat ↓ Process API (vertical) -->
  <line x1="250" y1="215" x2="266" y2="233" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="210" y="240" fill="#94a3b8" font-size="9" text-anchor="middle">PID</text>

  <!-- Arrow: Process API → System -->
  <line x1="440" y1="233" x2="546" y2="233" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr-cyan)"/>
  <text x="493" y="226" fill="#94a3b8" font-size="9" text-anchor="middle">queries</text>

  <!-- Arrow: Kill → System (vertical down) -->
  <line x1="600" y1="125" x2="600" y2="201" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-rose)"/>
  <text x="618" y="168" fill="#fb7185" font-size="9">kills</text>

  <!-- Arrow: netstat → App (diagonal to bottom edge) -->
  <line x1="200" y1="215" x2="248" y2="140" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="208" y="183" fill="#94a3b8" font-size="9">ports</text>

  <!-- Arrow: Process API → App (vertical up) -->
  <line x1="330" y1="200" x2="330" y2="144" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr-cyan)"/>
  <text x="348" y="178" fill="#94a3b8" font-size="9">name, mem, cpu</text>

  <!-- ==================== ROW 3 ==================== -->

  <!-- Output box -->
  <rect x="60" y="335" width="680" height="95" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="400" y="357" fill="white" font-size="11" font-weight="600" text-anchor="middle">Result: DataGridView (Virtual Mode)</text>

  <g transform="translate(80,374)">
    <text x="0" y="0" fill="#94a3b8" font-size="9" font-family="monospace">Port  PID  Name    Proto  State   Remote        Mem   CPU   Path</text>
    <text x="0" y="15" fill="#64748b" font-size="9" font-family="monospace">──── ──── ─────── ───── ────── ──────────── ───── ───── ─────────────────</text>
    <text x="0" y="30" fill="white" font-size="9" font-family="monospace">3000 4404 node    TCP    Listen  0.0.0.0:0    42.3  2.1   C:\Program Files\...</text>
    <text x="0" y="45" fill="#64748b" font-size="9" font-family="monospace">──── only visible rows rendered (VirtualMode) ────</text>
  </g>

  <!-- Arrow: App → Output (vertical down) -->
  <line x1="330" y1="140" x2="330" y2="331" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="348" y="244" fill="#94a3b8" font-size="9">builds list</text>

  <!-- Arrow: Process API → Output (diagonal to top edge) -->
  <line x1="430" y1="260" x2="500" y2="335" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="440" y="305" fill="#94a3b8" font-size="9">path</text>

  <!-- Footer -->
  <text x="400" y="448" fill="#475569" font-size="9" text-anchor="middle">No admin required · No dependencies · Single .exe · 22 KB</text>
</svg>
