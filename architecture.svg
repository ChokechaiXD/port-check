<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" style="background:#0f172a;border-radius:12px;font-family:system-ui,-apple-system,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-rose" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fb7185"/>
    </marker>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="400" y="36" fill="white" font-size="15" font-weight="700" text-anchor="middle">Port Checker — Architecture</text>

  <!-- Legend -->
  <rect x="610" y="50" width="16" height="10" rx="2" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="632" y="58" fill="#94a3b8" font-size="9">Windows API</text>

  <rect x="610" y="66" width="16" height="10" rx="2" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="632" y="74" fill="#94a3b8" font-size="9">Data</text>

  <rect x="610" y="82" width="16" height="10" rx="2" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1"/>
  <text x="632" y="90" fill="#94a3b8" font-size="9">Action</text>

  <rect x="610" y="98" width="16" height="10" rx="2" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1"/>
  <text x="632" y="106" fill="#94a3b8" font-size="9">External</text>

  <!-- ============== COMPONENTS ============== -->

  <!-- 1. User launches app -->
  <rect x="40" y="70" width="140" height="60" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="110" y="98" fill="white" font-size="11" font-weight="600" text-anchor="middle">User</text>
  <text x="110" y="116" fill="#94a3b8" font-size="9" text-anchor="middle">Double-click .exe</text>

  <!-- 2. Port Checker App -->
  <rect x="260" y="60" width="160" height="80" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="340" y="88" fill="white" font-size="12" font-weight="600" text-anchor="middle">port-check.exe</text>
  <text x="340" y="106" fill="#94a3b8" font-size="9" text-anchor="middle">WinForms GUI</text>
  <text x="340" y="122" fill="#22d3ee" font-size="8" text-anchor="middle">VirtualMode DataGridView</text>
  
  <!-- Arrow: User → App -->
  <line x1="180" y1="100" x2="256" y2="100" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="218" y="94" fill="#64748b" font-size="9" text-anchor="middle">launches</text>

  <!-- 3. netstat -ano -->
  <rect x="40" y="200" width="140" height="60" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="110" y="226" fill="white" font-size="11" font-weight="600" text-anchor="middle">netstat -ano</text>
  <text x="110" y="244" fill="#94a3b8" font-size="9" text-anchor="middle">Built-in Windows CMD</text>

  <!-- Arrow: App ← netstat -->
  <line x1="260" y1="220" x2="184" y2="220" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="222" y="214" fill="#94a3b8" font-size="9" text-anchor="middle">TCP + UDP data</text>

  <!-- 4. Process API -->
  <rect x="260" y="190" width="160" height="80" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="340" y="216" fill="white" font-size="11" font-weight="600" text-anchor="middle">Process API</text>
  <text x="340" y="234" fill="#94a3b8" font-size="9" text-anchor="middle">GetProcessById()</text>
  <text x="340" y="250" fill="#94a3b8" font-size="9" text-anchor="middle">TotalProcessorTime</text>

  <!-- Arrow: netstat → Process API (data merge) -->
  <line x1="180" y1="230" x2="256" y2="230" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="218" y="248" fill="#94a3b8" font-size="9" text-anchor="middle">PID → process</text>

  <!-- 5. System Processes -->
  <rect x="490" y="190" width="130" height="80" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="555" y="216" fill="white" font-size="11" font-weight="600" text-anchor="middle">System Processes</text>
  <text x="555" y="234" fill="#94a3b8" font-size="9" text-anchor="middle">svchost.exe</text>
  <text x="555" y="248" fill="#94a3b8" font-size="9" text-anchor="middle">node.exe, etc.</text>

  <!-- Arrow: Process API → System -->
  <line x1="420" y1="230" x2="486" y2="230" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="453" y="248" fill="#94a3b8" font-size="9" text-anchor="middle">queries</text>

  <!-- 6. User kills process -->
  <rect x="490" y="60" width="130" height="60" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="555" y="88" fill="white" font-size="11" font-weight="600" text-anchor="middle">Kill Process</text>
  <text x="555" y="106" fill="#fb7185" font-size="9" text-anchor="middle">Process.Kill()</text>

  <!-- Arrow: App → Kill -->
  <line x1="420" y1="90" x2="486" y2="90" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrow-rose)"/>
  <text x="453" y="84" fill="#fb7185" font-size="9" text-anchor="middle">user clicks</text>

  <!-- Arrow: Kill → System -->
  <line x1="555" y1="120" x2="555" y2="186" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-rose)"/>
  <text x="570" y="156" fill="#fb7185" font-size="9" text-anchor="start">terminates</text>

  <!-- 7. Output (table rows) -->
  <rect x="30" y="340" width="580" height="95" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="320" y="362" fill="white" font-size="11" font-weight="600" text-anchor="middle">Result: DataGridView (Virtual Mode)</text>
  <text x="70" y="382" fill="#94a3b8" font-size="9">Port │ PID  │ Name    │ Proto │ State  │ Remote     │ Mem  │ CPU% │ Path</text>
  <text x="70" y="398" fill="#64748b" font-size="9">─────┼──────┼─────────┼───────┼────────┼────────────┼──────┼──────┼────────────────</text>
  <text x="70" y="414" fill="white" font-size="9">3000 │ 4404 │ node    │ TCP   │ Listen │ 0.0.0.0:0 │ 42.3 │ 2.1  │ C:\Program Files\node\...</text>
  <text x="70" y="428" fill="#64748b" font-size="9">─── row visible ───</text>

  <!-- Arrow: App (Process API section) → Output -->
  <line x1="340" y1="270" x2="340" y2="336" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="355" y="308" fill="#94a3b8" font-size="9">builds data list</text>

  <!-- Footer note -->
  <text x="400" y="445" fill="#475569" font-size="9" text-anchor="middle">No admin required · No dependencies · Single .exe · 22 KB</text>
</svg>
